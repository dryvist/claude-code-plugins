name: gh-aw pin refresh

on:
  schedule:
    - cron: "0 12 * * 1"  # Monday 12:00 UTC (7am CDT / 6am CST)
    - cron: "0 12 * * 4"  # Thursday 12:00 UTC (7am CDT / 6am CST)
  workflow_dispatch:
    inputs:
      operation:
        description: 'compile = refresh SHA pins only; upgrade = full gh-aw infrastructure update'
        type: choice
        default: 'compile'
        options:
          - compile
          - upgrade

permissions: {}

concurrency:
  group: gh-aw-pin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    permissions:
      contents: write
      pull-requests: write
    uses: JacobPEvans-personal/.github/.github/workflows/_gh-aw-pin-refresh.yml@4fedfeac6c9adec53ab24c44bf7feca6384ac29b # main
    with:
      operation: ${{ inputs.operation || 'compile' }}
    secrets:
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
