name: Validate Agent Skills

on:
  push:
    branches: ["**"]
    paths:
      - "**/skills/*/SKILL.md"
      - ".github/workflows/validate-skills.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/skills/*/SKILL.md"
      - ".github/workflows/validate-skills.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install skills-ref
        run: pip install skills-ref==0.1.1

      - name: Validate all skills
        run: |
          failed=0
          for skill_dir in $(find . -name "SKILL.md" -path "*/skills/*" -not -path "./.github/*" -exec dirname {} \;); do
            echo "Validating $skill_dir..."
            if ! agentskills validate "$skill_dir"; then
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more skills failed validation"
            exit 1
          fi
          echo "All skills pass agentskills.io validation"

      - name: Check progressive disclosure limits
        run: |
          failed=0
          for skill_file in $(find . -name "SKILL.md" -path "*/skills/*" -not -path "./.github/*"); do
            skill_name=$(basename "$(dirname "$skill_file")")
            lines=$(wc -l < "$skill_file")

            # Hard limit: 500 lines
            if [ "$lines" -gt 500 ]; then
              echo "::error file=$skill_file::$skill_name exceeds 500-line hard limit ($lines lines)"
              failed=1
            # Soft limit: warn at 400 lines (approaching 500)
            elif [ "$lines" -gt 400 ]; then
              echo "::warning file=$skill_file::$skill_name approaching 500-line limit ($lines lines)"
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All skills within progressive disclosure limits"
